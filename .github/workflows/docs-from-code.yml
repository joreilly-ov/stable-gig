name: Docs From Code

on:
  pull_request:
    paths:
      - backend/**
      - scripts/**
      - .github/workflows/docs-from-code.yml
  push:
    branches:
      - main
    paths:
      - backend/**
      - scripts/**
      - .github/workflows/docs-from-code.yml

permissions:
  contents: write

jobs:
  docs-freshness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Check out the real branch (not the detached merge-commit HEAD that
          # pull_request events produce) so we can push the commit back.
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r backend/requirements-test.txt

      - name: Regenerate docs from code and tests
        shell: pwsh
        run: ./scripts/generate_docs.ps1 -SkipHtml -SkipJunit

      - name: Commit regenerated docs if stale
        run: |
          git diff --quiet -- docs/generated && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/generated
          git commit -m "chore: regenerate docs/generated [skip ci]"
          git push
